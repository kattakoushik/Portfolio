<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KATTA KOUSHIK | PORTFOLIO</title>
    <meta name="description" content="Koushik Katta's portfolio is currently under construction. Stay tuned for exciting updates.">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Under Construction</h1>
        <p>I'm currently crafting a new digital experience. Enter your details below to be notified when the full site launches.</p>
        
        <form id="contactForm" class="contact-form">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="E.g. XYZ" required>
            </div>
            
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="E.g. xyz@example.com" required>
            </div>
            
            <button type="submit" id="submitBtn">
                <span class="btn-text">Notify Me</span>
                <div class="loader" id="loader"></div>
            </button>
        </form>
        
        <div id="successMessage" class="message success">
            Thank you! I've received your message and will get back to you soon.
        </div>
        <div id="errorMessage" class="message error">
            Oops! Something went wrong. Please try again later.
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
